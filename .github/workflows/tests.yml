# ==============================================================================
# TESTS
# ==============================================================================
name: Tests

# ==============================================================================
# TRIGGERS
# ==============================================================================
on:
    push:
        branches: [ master ]
    pull_request:
        types: [ opened, synchronize, reopened, ready_for_review ]
    workflow_dispatch:

# ==============================================================================
# CONCURRENCY
# ==============================================================================
concurrency:
    group: tests-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

# ==============================================================================
# PERMISSIONS
# ==============================================================================
permissions:
    contents: read
    id-token: write

# ==============================================================================
# DEFAULTS
# ==============================================================================
defaults:
    run:
        shell: bash

jobs:

    # ==========================================================================
    # JOB: TESTS
    # ==========================================================================
    tests:
        name: Test / PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel.label }}
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                include:
                    -   php: 8.3
                        laravel:
                            constraint: ^12.0
                            label: 12
                    -   php: 8.4
                        laravel:
                            constraint: ^12.0
                            label: 12
                    -   php: 8.5
                        laravel:
                            constraint: ^12.0
                            label: 12
                    -   php: 8.3
                        laravel:
                            constraint: ^13.0
                            label: 13

        steps:
            -   name: Checkout
                uses: actions/checkout@v5
                with:
                    persist-credentials: false

            -   name: Setup PHP
                uses: sinemacula/.github/.github/actions/setup-php@v1.1.1
                with:
                    php-version: ${{ matrix.php }}

            -   name: Pin Laravel version
                env:
                    LARAVEL_CONSTRAINT: ${{ matrix.laravel.constraint }}
                run: composer update --with="laravel/framework:${LARAVEL_CONSTRAINT}" --prefer-dist --no-interaction --no-progress

            -   name: PHPUnit
                run: composer test:coverage

            -   name: Benchmark smoke
                run: composer bench:smoke

            -   name: Publish code coverage
                if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && matrix.laravel.label == '13' }}
                uses: qltysh/qlty-action/coverage@v2
                with:
                    oidc: true
                    files: clover.xml
